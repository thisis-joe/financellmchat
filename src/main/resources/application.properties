spring.application.name=finance-rag

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/finance_rag?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:finance}
spring.datasource.password=${DB_PASSWORD:finance}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

rag.service.base-url=${RAG_SERVICE_BASE_URL:http://localhost:8000}
documents.raw-pdf-dir=${DOCUMENTS_RAW_PDF_DIR:data/raw/busanbank/product-disclosure/deposit/installment}
